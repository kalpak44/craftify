name: Build and Publish Backend Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - backend/**
      - .github/workflows/backend-ghcr.yml
  pull_request:
    branches: [ main ]
    paths:
      - backend/**
      - .github/workflows/backend-ghcr.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Prepare image vars
        id: vars
        run: |
          SHA_SHORT="$(git rev-parse --short=7 HEAD)"
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${IMAGE_BASE}:${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_BASE}:latest" >> "$GITHUB_OUTPUT"

      - name: Build image with Spring Boot
        working-directory: backend
        run: |
          mvn -B -DskipTests spring-boot:build-image \
            -Dspring-boot.build-image.imageName="${{ steps.vars.outputs.image_sha }}"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image tags
        if: github.event_name == 'push'
        id: push
        run: |
          docker push "${{ steps.vars.outputs.image_sha }}" | tee /tmp/sha-push.log
          docker tag "${{ steps.vars.outputs.image_sha }}" "${{ steps.vars.outputs.image_latest }}"
          docker push "${{ steps.vars.outputs.image_latest }}"
          DIGEST="$(grep -Eo 'sha256:[a-f0-9]{64}' /tmp/sha-push.log | tail -n1)"
          if [ -z "$DIGEST" ]; then
            DIGEST_REF="$(docker image inspect --format='{{index .RepoDigests 0}}' "${{ steps.vars.outputs.image_sha }}" 2>/dev/null || true)"
            DIGEST="${DIGEST_REF#*@}"
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Generate build report
        run: |
          echo "### Backend Image Build" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "- Status: built and pushed to GHCR" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Status: built (PR validation, no push)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Platform: \`linux/amd64\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA tag: \`${{ steps.vars.outputs.image_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "- Latest tag: \`${{ steps.vars.outputs.image_latest }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Digest: \`${{ steps.push.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
