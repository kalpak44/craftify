name: Build and Publish Backend Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - backend/**
      - .github/workflows/backend-ghcr.yml
  pull_request:
    branches: [ main ]
    paths:
      - backend/**
      - .github/workflows/backend-ghcr.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Prepare image vars
        id: vars
        run: |
          SHA_SHORT="$(git rev-parse --short=7 HEAD)"
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${IMAGE_BASE}:${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_BASE}:latest" >> "$GITHUB_OUTPUT"

      - name: Build image with Spring Boot
        working-directory: backend
        run: |
          mvn -B -DskipTests spring-boot:build-image \
            -Dspring-boot.build-image.imageName="${{ steps.vars.outputs.image_sha }}"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push SHA and latest tags
        if: github.event_name == 'push'
        id: push
        run: |
          docker push "${{ steps.vars.outputs.image_sha }}" | tee /tmp/sha-push.log
          docker tag "${{ steps.vars.outputs.image_sha }}" "${{ steps.vars.outputs.image_latest }}"
          docker push "${{ steps.vars.outputs.image_latest }}"
          DIGEST="$(awk '/digest:/ {print $2}' /tmp/sha-push.log | tail -n1)"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Generate build report
        run: |
          echo "### Backend Docker Image Build Report" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Successfully built and pushed the backend image to GHCR." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Successfully built the backend image (PR validation, no push)." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Platform:** \`linux/amd64\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag |" >> "$GITHUB_STEP_SUMMARY"
          echo "| :--- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`${{ steps.vars.outputs.image_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "| \`${{ steps.vars.outputs.image_latest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "**Digest:** \`${{ steps.push.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
