spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:}
  datasource:
    url: ${DB_CONNECTION_STRING:jdbc:postgresql://localhost:5432/craftify}
    username: ${DB_USERNAME:craftify}
    password: ${DB_PASSWORD:craftify}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  max-http-request-header-size: 100MB
  shutdown: graceful
  port: 8080
  compression:
    enabled: true
    mime-types: text/xml,text/plain,application/json
    min-response-size: 1024

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    operationsSorter: alpha
    tagsSorter: alpha

logging:
  level:
    root: INFO
    org.springframework: INFO
    com.fasterxml.jackson.databind: INFO

auth0:
  audience: ${AUTH0_AUDIENCE:}
